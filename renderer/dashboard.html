<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LifeCheck</title>
<!--
  dashboard.html — Reminder management panel
  ==========================================
  No framework, no build step — vanilla HTML/CSS/JS.
  Data is read/written via Electron IPC (ipcRenderer.invoke).

  HOW TO CONTRIBUTE:
  - Add a new category  → add to CAT_EMOJI map + <select> in the Add tab
  - Add a new tab       → add .tab div + #tab-xxx div + handle in switchTab()
  - Change color theme  → edit CSS variables in :root
-->
<style>
  /* ── Design tokens ──────────────────────────────────────────────────────── */
  :root {
    --bg:      #1a1a2e;
    --card:    #16213e;
    --accent:  #e94560;
    --accent2: #0f3460;
    --text:    #eaeaea;
    --muted:   #888;
    --green:   #4caf50;
    --yellow:  #ffb300;
    --red:     #e94560;
    --mono:    'Courier New', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    height: 620px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 2px solid var(--accent);
    border-radius: 12px;
  }

  /* ── Title bar (draggable) ──────────────────────────────────────────────── */
  #titlebar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--accent2);
    -webkit-app-region: drag;
  }
  #titlebar h1  { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; }
  #titlebar span { font-size: 11px; color: var(--muted); }
  #close-btn {
    -webkit-app-region: no-drag;
    cursor: pointer;
    background: var(--accent);
    border: none; color: #fff;
    width: 20px; height: 20px;
    border-radius: 4px; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Tab bar ────────────────────────────────────────────────────────────── */
  #tabs { display: flex; background: var(--card); border-bottom: 1px solid #333; }
  .tab {
    flex: 1; padding: 8px 4px;
    font-size: 10px; text-align: center; cursor: pointer;
    color: var(--muted); letter-spacing: 1px; text-transform: uppercase;
    border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── Scrollable content area ────────────────────────────────────────────── */
  #content { flex: 1; overflow-y: auto; padding: 12px; }
  #content::-webkit-scrollbar       { width: 4px; }
  #content::-webkit-scrollbar-track { background: var(--card); }
  #content::-webkit-scrollbar-thumb { background: var(--accent2); border-radius: 2px; }

  /* ── Section heading ────────────────────────────────────────────────────── */
  .section-title {
    font-size: 10px; color: var(--accent);
    letter-spacing: 2px; text-transform: uppercase;
    margin: 12px 0 6px;
    border-bottom: 1px solid #333; padding-bottom: 4px;
  }

  /* ── Reminder card ──────────────────────────────────────────────────────── */
  .item-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: 8px;
    padding: 8px 12px; margin-bottom: 6px;
    border-left: 3px solid transparent;
    cursor: pointer; transition: opacity .2s;
  }
  .item-card:hover   { opacity: .85; }
  .item-card.urgent  { border-left-color: var(--red);    }
  .item-card.warning { border-left-color: var(--yellow); }
  .item-card.ok      { border-left-color: var(--green);  }
  .item-card.expired { border-left-color: #555; opacity: .7; }

  .item-emoji { font-size: 18px; }
  .item-info  { flex: 1; }
  .item-name  { font-size: 11px; font-weight: bold; }
  .item-sub   { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Status badge */
  .badge {
    font-size: 9px; padding: 2px 6px;
    border-radius: 4px; font-weight: bold; letter-spacing: 1px;
  }
  .badge-red    { background: var(--red);    color: #fff; }
  .badge-yellow { background: var(--yellow); color: #111; }
  .badge-green  { background: var(--green);  color: #fff; }
  .badge-gray   { background: #555;          color: #ccc; }

  .empty { text-align: center; color: var(--muted); font-size: 11px; padding: 20px; }

  /* ── Alfred greeting bar ────────────────────────────────────────────────── */
  #dash-alfred {
    display: flex; align-items: center; gap: 12px;
    background: var(--accent2); border-radius: 8px;
    padding: 10px 14px; margin-bottom: 12px;
  }
  #dash-alfred img  { image-rendering: pixelated; width: 48px; height: 48px; flex-shrink: 0; }
  #dash-alfred span { font-size: 11px; line-height: 1.5; }

  /* ── Form controls ──────────────────────────────────────────────────────── */
  .form-group       { margin-bottom: 12px; }
  .form-group label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: 1px; }
  .form-group input,
  .form-group select {
    width: 100%; background: var(--card);
    border: 1px solid #333; border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 7px 10px; outline: none; transition: border-color .2s;
  }
  .form-group input:focus,
  .form-group select:focus { border-color: var(--accent); }
  .form-group select option { background: var(--card); }

  /* ── Buttons ────────────────────────────────────────────────────────────── */
  .btn {
    padding: 8px 16px; border-radius: 6px; border: none;
    font-family: var(--mono); font-size: 11px;
    cursor: pointer; letter-spacing: 1px; transition: opacity .2s;
  }
  .btn:hover      { opacity: .85; }
  .btn-primary    { background: var(--accent); color: #fff; }
  .btn-secondary  { background: #333; color: var(--text); }
  .btn-danger     { background: #c62828; color: #fff; font-size: 10px; padding: 4px 8px; }
  .btn-row        { display: flex; gap: 8px; margin-top: 4px; }

  /* ── Settings rows ──────────────────────────────────────────────────────── */
  .setting-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #222; font-size: 11px;
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .setting-row input {
    background: var(--card); border: 1px solid #333; border-radius: 6px;
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 5px 8px; outline: none; width: 180px; transition: border-color .2s;
  }
  .setting-row input:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- Title bar -->
<div id="titlebar">
  <h1>&#9830; LifeCheck</h1>
  <span>Alfred at your service</span>
  <button id="close-btn" onclick="window.close()">✕</button>
</div>

<!-- Tabs -->
<div id="tabs">
  <div class="tab active" data-tab="dash">Today</div>
  <div class="tab" data-tab="all">All</div>
  <div class="tab" data-tab="add">+ Add</div>
  <div class="tab" data-tab="settings">Settings</div>
</div>

<!-- Content panels (only one visible at a time) -->
<div id="content">

  <!-- TODAY ──────────────────────────────────────────────────────────────── -->
  <div id="tab-dash">
    <div id="dash-alfred">
      <img src="../assets/alfred.png" alt="Alfred">
      <span id="alfred-speech">Good day. Here is your daily briefing, sir.</span>
    </div>
    <div id="dash-expired"></div>
    <div id="dash-upcoming"></div>
    <div id="dash-ok"></div>
  </div>

  <!-- ALL ────────────────────────────────────────────────────────────────── -->
  <div id="tab-all" style="display:none">
    <div id="all-list"></div>
  </div>

  <!-- ADD / EDIT ─────────────────────────────────────────────────────────── -->
  <div id="tab-add" style="display:none">
    <div class="section-title" id="form-title">New Reminder</div>

    <div class="form-group">
      <label>NAME</label>
      <input id="f-name" type="text" placeholder="e.g. Renew passport">
    </div>

    <!--
      TO ADD A NEW CATEGORY:
      1. Add an <option> here with a unique value
      2. Add the same key to CAT_EMOJI in the script below
    -->
    <div class="form-group">
      <label>CATEGORY</label>
      <select id="f-cat">
        <option value="document">📄 Document</option>
        <option value="vehicle">🚗 Vehicle</option>
        <option value="health">💊 Health / Gym</option>
        <option value="birthday">🎂 Birthday</option>
        <option value="subscription">💳 Subscription / Bill</option>
        <option value="other">📌 Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>DUE DATE / EVENT DATE</label>
      <input id="f-date" type="date">
    </div>

    <div class="form-group">
      <label>REMIND ME (days in advance)</label>
      <select id="f-alert">
        <option value="1">1 day</option>
        <option value="3">3 days</option>
        <option value="7" selected>7 days</option>
        <option value="14">14 days</option>
        <option value="30">30 days</option>
        <option value="60">60 days</option>
      </select>
    </div>

    <div class="form-group">
      <label>NOTE (optional)</label>
      <input id="f-note" type="text" placeholder="e.g. Book appointment first">
    </div>

    <div class="btn-row">
      <button class="btn btn-primary"   id="save-btn">SAVE</button>
      <button class="btn btn-secondary" id="cancel-btn">CANCEL</button>
    </div>
  </div>

  <!-- SETTINGS ───────────────────────────────────────────────────────────── -->
  <div id="tab-settings" style="display:none">
    <div class="section-title">Preferences</div>
    <div class="setting-row">
      <span class="setting-label">Your name</span>
      <input id="s-name" type="text" placeholder="e.g. Bruce">
    </div>
    <div class="setting-row">
      <span class="setting-label">Version</span>
      <span style="color:var(--muted)">1.0.0</span>
    </div>
    <div class="setting-row">
      <span class="setting-label">Data file</span>
      <span id="s-datapath" style="color:var(--muted);font-size:9px">—</span>
    </div>
    <div style="margin-top:16px">
      <button class="btn btn-primary" id="settings-save-btn">SAVE SETTINGS</button>
    </div>
  </div>

</div><!-- #content -->

<script>
'use strict';
const { ipcRenderer } = require('electron');

// ── Category map ──────────────────────────────────────────────────────────────
// Maps category value → emoji. Add your new category here too.
const CAT_EMOJI = {
  document: '📄', vehicle: '🚗', health: '💊',
  birthday: '🎂', subscription: '💳', other: '📌',
  // Legacy Spanish keys (for existing user data)
  documento: '📄', vehiculo: '🚗', salud: '💊',
  cumpleanos: '🎂', suscripcion: '💳', otro: '📌',
};

// ── Helpers ───────────────────────────────────────────────────────────────────
/** Returns days until dateStr (negative = already expired) */
function daysUntil(dateStr) {
  const today  = new Date(); today.setHours(0, 0, 0, 0);
  const target = new Date(dateStr); target.setHours(0, 0, 0, 0);
  return Math.ceil((target - today) / 86400000);
}

function formatDate(dateStr) {
  return new Date(dateStr + 'T00:00:00')
    .toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
}

/** Returns [badgeLabel, badgeCssClass] for a given days value */
function badge(days, alertDays) {
  if (days < 0)          return ['EXPIRED', 'badge-gray'];
  if (days === 0)        return ['TODAY',   'badge-red'];
  if (days <= 3)         return [`${days}d`, 'badge-red'];
  if (days <= alertDays) return [`${days}d`, 'badge-yellow'];
  return [`${days}d`, 'badge-green'];
}

function cardClass(days, alertDays) {
  if (days < 0)          return 'expired';
  if (days <= 3)         return 'urgent';
  if (days <= alertDays) return 'warning';
  return 'ok';
}

// ── State ─────────────────────────────────────────────────────────────────────
let data   = { items: [], name: '' };
let editId = null;   // null = new item, string = editing existing item

// ── Data loading ──────────────────────────────────────────────────────────────
async function load() {
  data = await ipcRenderer.invoke('get-data');
  renderDash();
  renderAll();
  loadSettings();
}

// ── Today tab ─────────────────────────────────────────────────────────────────
function renderDash() {
  const items   = (data.items || []).filter(i => i.date);
  const name    = data.name || 'sir';
  const expired = items.filter(i => daysUntil(i.date) < 0);
  const urgent  = items.filter(i => { const d = daysUntil(i.date); return d >= 0 && d <= 3; });
  const warning = items.filter(i => { const d = daysUntil(i.date); return d > 3 && d <= (i.alertDays ?? 7); });
  const ok      = items.filter(i => daysUntil(i.date) > (i.alertDays ?? 7));

  // Alfred's greeting line
  document.getElementById('alfred-speech').textContent =
    expired.length ? `${name}, you have ${expired.length} expired item${expired.length > 1 ? 's' : ''}. Immediate attention required.` :
    urgent.length || warning.length ? `${urgent.length + warning.length} upcoming reminder${urgent.length + warning.length > 1 ? 's' : ''}, ${name}. I shall keep you informed.` :
    `Everything is in order, ${name}. Have an excellent day.`;

  section('dash-expired',  '🚨 Expired',  expired);
  section('dash-upcoming', '⚡ Upcoming', [...urgent, ...warning]);
  section('dash-ok',       '✅ All clear', ok);

  if (!items.length)
    document.getElementById('dash-expired').innerHTML =
      '<div class="empty">No reminders yet.<br>Press "+ Add" to get started.</div>';
}

/** Renders a titled section of item cards into a container div */
function section(id, title, items) {
  const el = document.getElementById(id);
  el.innerHTML = items.length
    ? `<div class="section-title">${title}</div>` + items.map(itemCard).join('')
    : '';
}

/** Returns the HTML string for one reminder card */
function itemCard(item) {
  const days = daysUntil(item.date);
  const [label, bc] = badge(days, item.alertDays ?? 7);
  return `<div class="item-card ${cardClass(days, item.alertDays ?? 7)}"
               onclick="openEdit('${item.id}')">
    <span class="item-emoji">${CAT_EMOJI[item.category] || '📌'}</span>
    <div class="item-info">
      <div class="item-name">${item.name}</div>
      <div class="item-sub">${formatDate(item.date)}${item.note ? ' — ' + item.note : ''}</div>
    </div>
    <span class="badge ${bc}">${label}</span>
  </div>`;
}

// ── All tab ───────────────────────────────────────────────────────────────────
function renderAll() {
  const sorted = [...(data.items || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  document.getElementById('all-list').innerHTML = sorted.length
    ? sorted.map(itemCard).join('')
    : '<div class="empty">No reminders yet.</div>';
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('#content > div').forEach(d =>
    d.style.display = 'none');
  document.getElementById('tab-' + name).style.display = 'block';
}

document.querySelectorAll('.tab').forEach(tab =>
  tab.addEventListener('click', () => {
    switchTab(tab.dataset.tab);
    if (tab.dataset.tab === 'add' && !editId) resetForm();
  })
);

// ── Add / Edit form ───────────────────────────────────────────────────────────
function resetForm() {
  editId = null;
  document.getElementById('f-name').value  = '';
  document.getElementById('f-cat').value   = 'document';
  document.getElementById('f-date').value  = '';
  document.getElementById('f-alert').value = '7';
  document.getElementById('f-note').value  = '';
  document.getElementById('form-title').textContent = 'New Reminder';
  document.getElementById('delete-btn')?.remove();
}

function openEdit(id) {
  const item = data.items.find(i => i.id === id);
  if (!item) return;
  editId = id;
  switchTab('add');
  document.getElementById('form-title').textContent  = 'Edit Reminder';
  document.getElementById('f-name').value  = item.name;
  document.getElementById('f-cat').value   = item.category;
  document.getElementById('f-date').value  = item.date;
  document.getElementById('f-alert').value = String(item.alertDays ?? 7);
  document.getElementById('f-note').value  = item.note || '';

  if (!document.getElementById('delete-btn')) {
    const btn = Object.assign(document.createElement('button'), {
      id: 'delete-btn', className: 'btn btn-danger', textContent: 'DELETE',
    });
    btn.addEventListener('click', deleteItem);
    document.querySelector('.btn-row').appendChild(btn);
  }
}

document.getElementById('save-btn').addEventListener('click', async () => {
  const name = document.getElementById('f-name').value.trim();
  const date = document.getElementById('f-date').value;
  document.getElementById('f-name').style.borderColor = name ? '#333' : 'var(--red)';
  document.getElementById('f-date').style.borderColor = date ? '#333' : 'var(--red)';
  if (!name || !date) return;

  const item = {
    id:        editId || Date.now().toString(),
    name,
    category:  document.getElementById('f-cat').value,
    date,
    alertDays: parseInt(document.getElementById('f-alert').value),
    note:      document.getElementById('f-note').value.trim(),
  };

  if (editId) {
    const idx = data.items.findIndex(i => i.id === editId);
    if (idx !== -1) data.items[idx] = item;
  } else {
    data.items.push(item);
  }

  await ipcRenderer.invoke('save-data', data);
  resetForm();
  load();
  switchTab('dash');
});

async function deleteItem() {
  if (!editId) return;
  data.items = data.items.filter(i => i.id !== editId);
  await ipcRenderer.invoke('save-data', data);
  resetForm();
  load();
  switchTab('all');
}

document.getElementById('cancel-btn').addEventListener('click', () => {
  resetForm(); switchTab('dash');
});

// ── Settings tab ──────────────────────────────────────────────────────────────
function loadSettings() {
  document.getElementById('s-name').value = data.name || '';
  ipcRenderer.invoke('get-data-path').then(p =>
    document.getElementById('s-datapath').textContent = p);
}

document.getElementById('settings-save-btn').addEventListener('click', async () => {
  data.name = document.getElementById('s-name').value.trim();
  await ipcRenderer.invoke('save-data', data);
  renderDash();
  const btn = document.getElementById('settings-save-btn');
  btn.textContent = 'SAVED ✓';
  setTimeout(() => btn.textContent = 'SAVE SETTINGS', 1500);
});

// ── Init ──────────────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>
