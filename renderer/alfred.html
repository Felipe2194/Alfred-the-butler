<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!--
  alfred.html — Floating character window
  ========================================
  Transparent, frameless Electron window that renders Alfred
  and his speech bubble. No framework — pure HTML/CSS/JS.

  HOW TO CONTRIBUTE:
  - Add new states (e.g. 'wave')  → add a CSS @keyframes + handle in setState()
  - Change walk speed             → edit WALK_MS constant in the script
  - Change bubble style           → edit #bubble styles
  - Add walk frames               → add to WALK_FRAMES array + process-sprites.js
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --talk-speed:  0.4s;
    --float-speed: 3s;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 300px; height: 340px;
    background: transparent;
    overflow: hidden;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  /* ── Speech bubble (8-bit dialog style) ────────────────────────────────── */
  /* Positioned inside the 300×340 window, above the sprite.                  */
  #bubble {
    position: absolute;
    bottom: 128px;      /* sits just above the sprite (112px + 16px gap)     */
    right: 0;           /* right-aligned, matching Alfred's position          */
    background: #f0f0ff;
    border: 3px solid #000;
    border-radius: 0;
    padding: 10px 12px 18px;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: 8px;
    color: #0a0a12;
    white-space: pre-wrap;
    width: 285px;
    box-shadow: 4px 4px 0 #000, 0 0 0 1px #00d4ff;
    line-height: 2;
    pointer-events: none;
    display: none;
    z-index: 999;
  }
  /* Blinking ▼ cursor */
  #bubble::before {
    content: '▼';
    position: absolute;
    bottom: 5px; right: 10px;
    font-size: 7px;
    color: #00d4ff;
    animation: blink-cur 1s steps(1) infinite;
  }
  @keyframes blink-cur {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  /* Bubble tail — points down-right toward Alfred's head */
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; right: 40px;
    border: 5px solid transparent;
    border-top-color: #000;
  }
  #bubble.visible {
    display: block;
    animation: pop-in .2s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: scale(.9) translateY(4px); }
    to   { opacity: 1; transform: scale(1)  translateY(0);   }
  }

  /* ── Sprite container ───────────────────────────────────────────────────── */
  /* Bottom-right of the window, mirrored to face left.                        */
  #alfred-wrap {
    position: absolute;
    bottom: 0; right: 0;
    transform: scaleX(-1);
    width: 112px; height: 112px;
    cursor: pointer;
  }

  #spr {
    position: absolute;
    top: 0; left: 0;
    width: 112px; height: 112px;
    image-rendering: pixelated;
  }

  /* ── Idle: gentle float ─────────────────────────────────────────────────── */
  @keyframes float {
    0%, 100% { transform: translateY(0);    }
    50%       { transform: translateY(-4px); }
  }

  /* ── Talk: head wobble ──────────────────────────────────────────────────── */
  @keyframes talk {
    0%, 100% { transform: translateY(0)    rotate(0deg);    }
    25%       { transform: translateY(-3px) rotate(-1.5deg); }
    75%       { transform: translateY(-3px) rotate(1.5deg);  }
  }

  /* State classes drive the CSS animation on the sprite image */
  #alfred-wrap.idle    #spr { animation: float var(--float-speed) ease-in-out infinite; }
  #alfred-wrap.talking #spr { animation: talk  var(--talk-speed)  ease-in-out infinite; }
  #alfred-wrap.walking #spr { animation: none; }

  /* Hover highlight */
  #alfred-wrap:hover #spr { filter: brightness(1.12); }
</style>
</head>
<body>

<div id="bubble"></div>

<div id="alfred-wrap" class="idle" title="Click to open dashboard">
  <img id="spr" src="../assets/alfred-idle.png" alt="" draggable="false">
</div>

<script>
'use strict';
const { ipcRenderer } = require('electron');

const wrap   = document.getElementById('alfred-wrap');
const spr    = document.getElementById('spr');
const bubble = document.getElementById('bubble');

// ── Frame sources ─────────────────────────────────────────────────────────────
const IDLE_FRAME  = '../assets/alfred-idle.png';
const WALK_FRAMES = [
  '../assets/alfred-walk-1.png',
  '../assets/alfred-walk-2.png',
  '../assets/alfred-walk-3.png',
  '../assets/alfred-walk-4.png',
];
const WALK_MS = 140;  // ms per walk frame (~7 fps) — edit to taste

// Preload all frames so src swaps are instant (no flicker)
[IDLE_FRAME, ...WALK_FRAMES].forEach(src => { const i = new Image(); i.src = src; });

// ── State machine ─────────────────────────────────────────────────────────────
// States: 'idle' | 'walk' | 'talk'
let walkTimer  = null;
let walkIndex  = 0;

function setState(state) {
  // Clear any running walk animation
  clearInterval(walkTimer);
  walkTimer = null;

  // Reset CSS state classes
  wrap.classList.remove('idle', 'walking', 'talking');

  if (state === 'walk') {
    wrap.classList.add('walking');
    walkIndex = 0;
    spr.src   = WALK_FRAMES[walkIndex];
    walkTimer = setInterval(() => {
      walkIndex = (walkIndex + 1) % WALK_FRAMES.length;
      spr.src   = WALK_FRAMES[walkIndex];
    }, WALK_MS);

  } else if (state === 'talk') {
    wrap.classList.add('talking');
    spr.src = IDLE_FRAME;

  } else {
    // idle
    wrap.classList.add('idle');
    spr.src = IDLE_FRAME;
  }
}

// ── Speech bubble ─────────────────────────────────────────────────────────────
let bubbleTimer = null;

function showBubble(text) {
  bubble.textContent = text;
  bubble.classList.add('visible');
  setState('talk');

  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('visible');
    setState('idle');
    // main.js will resume walking via pauseWalking timeout
  }, 5000 + text.split('\n').length * 1200);
}

// ── IPC from main process ─────────────────────────────────────────────────────
ipcRenderer.on('set-state', (_, s) => setState(s));
ipcRenderer.on('speak',     (_, t) => showBubble(t));

// ── Click → open dashboard ────────────────────────────────────────────────────
wrap.addEventListener('click', () => ipcRenderer.invoke('open-dash'));
</script>
</body>
</html>
