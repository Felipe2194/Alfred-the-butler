<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!--
  alfred.html — Floating character window
  ========================================
  This is a transparent, frameless Electron window that renders Alfred
  and his speech bubble. No framework — pure HTML/CSS/JS.

  HOW TO CONTRIBUTE:
  - Add new states (e.g. 'wave')  → add a CSS @keyframes + handle in setState()
  - Change animation speed        → edit --walk-speed and --talk-speed variables
  - Change bubble style           → edit #bubble styles
-->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  :root {
    --walk-speed: 0.45s;   /* sprite cycle speed while walking */
    --talk-speed: 0.4s;    /* wobble speed while talking       */
    --float-speed: 3s;     /* idle floating speed              */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 120px; height: 220px;
    background: transparent;
    overflow: visible;
    user-select: none;
    -webkit-app-region: no-drag;
  }

  /* ── Speech bubble (8-bit dialog style) ────────────────────────────────── */
  #bubble {
    position: fixed;
    bottom: 222px;
    left: 50%;
    transform: translateX(-50%);
    background: #f0f0ff;
    border: 3px solid #000;
    border-radius: 0;
    padding: 10px 12px 14px;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: 8px;
    color: #0a0a12;
    white-space: pre-wrap;
    width: 270px;
    box-shadow: 4px 4px 0 #000, 0 0 0 1px #00d4ff;
    line-height: 1.9;
    pointer-events: none;
    display: none;
    z-index: 999;
  }
  /* Pixel-art blinking ▼ cursor inside the bubble */
  #bubble::before {
    content: '▼';
    position: absolute;
    bottom: 4px; right: 8px;
    font-size: 7px;
    color: #00d4ff;
    animation: blink-cur 1s steps(1) infinite;
  }
  @keyframes blink-cur {
    0%, 49% { opacity: 1; }
    50%, 100% { opacity: 0; }
  }
  /* Tail of the bubble */
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: #000;
  }
  #bubble.visible {
    display: block;
    animation: pop-in .25s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes pop-in {
    from { opacity: 0; transform: translateX(-50%) scale(.85) translateY(6px); }
    to   { opacity: 1; transform: translateX(-50%) scale(1)  translateY(0);   }
  }

  /* ── Sprite container ───────────────────────────────────────────────────── */
  #alfred-wrap {
    position: absolute;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 112px; height: 112px;
    cursor: pointer;
  }

  /* Both sprites stacked on top of each other */
  .spr {
    position: absolute;
    top: 0; left: 0;
    width: 112px; height: 112px;
    image-rendering: pixelated;
  }

  /* ── Idle animation: gentle float ───────────────────────────────────────── */
  @keyframes float {
    0%, 100% { transform: translateY(0);    }
    50%       { transform: translateY(-4px); }
  }

  /* ── Walk animation: CSS cycles between idle/walk sprites ───────────────── */
  /* This replaces the old JS walk-tick IPC (was 33 calls/sec → now 0).       */
  /* The idle sprite fades in/out on a stepped cycle; walk sprite is inverse.  */
  @keyframes sprite-cycle {
    0%, 49.9% { opacity: 1; }
    50%, 100%  { opacity: 0; }
  }

  /* ── Talk animation: head wobble ────────────────────────────────────────── */
  @keyframes talk {
    0%, 100% { transform: translateY(0)    rotate(0deg);    }
    25%       { transform: translateY(-3px) rotate(-1.5deg); }
    75%       { transform: translateY(-3px) rotate(1.5deg);  }
  }

  /* ── State: idle (default) ───────────────────────────────────────────────── */
  #spr-idle { animation: float var(--float-speed) ease-in-out infinite; }
  #spr-walk { display: none; }

  /* ── State: walking ──────────────────────────────────────────────────────── */
  #alfred-wrap.walking #spr-idle {
    display: block;
    animation: sprite-cycle var(--walk-speed) steps(1, end) infinite;
  }
  #alfred-wrap.walking #spr-walk {
    display: block;
    animation: sprite-cycle var(--walk-speed) steps(1, end) infinite reverse;
  }

  /* ── State: talking ──────────────────────────────────────────────────────── */
  #alfred-wrap.talking #spr-idle {
    animation: talk var(--talk-speed) ease-in-out infinite;
  }
  #alfred-wrap.talking #spr-walk { display: none; }

  /* ── Direction: facing right (mirror all sprites via parent) ─────────────── */
  #alfred-wrap.facing-right { transform: translateX(-50%) scaleX(-1); }

  /* Hover highlight */
  #alfred-wrap:hover .spr { filter: brightness(1.12); }
</style>
</head>
<body>

<div id="bubble"></div>

<div id="alfred-wrap" title="Click to open dashboard">
  <img id="spr-idle" class="spr" src="../assets/alfred.png"      alt="" draggable="false">
  <img id="spr-walk" class="spr" src="../assets/alfred-walk.png" alt="" draggable="false">
</div>

<script>
'use strict';
const { ipcRenderer } = require('electron');

const wrap   = document.getElementById('alfred-wrap');
const bubble = document.getElementById('bubble');

// ── Sprite fringe cleanup ─────────────────────────────────────────────────────
// The background-removal scripts leave anti-aliased "fringe" pixels at the
// character's edges — near-white remnants of the original background that appear
// as white lines when Alfred walks over dark surfaces.
//
// This Canvas pass runs once per sprite at load-time:
//   1. Replicate the flood-fill with a wider tolerance (±60 vs ±25)
//      starting from the four edges of the bitmap.
//   2. Up to 3 iterative edge-erosion passes to catch multi-pixel fringe bands.
// Only pixels that are BOTH near the background colour AND adjacent to a
// transparent pixel are removed — interior character pixels are untouched.
function cleanFringe(imgEl) {
  return new Promise(resolve => {
    const c   = document.createElement('canvas');
    c.width   = imgEl.naturalWidth;
    c.height  = imgEl.naturalHeight;
    const ctx = c.getContext('2d');
    ctx.drawImage(imgEl, 0, 0);
    const id  = ctx.getImageData(0, 0, c.width, c.height);
    const px  = id.data;
    const W   = c.width, H = c.height;

    // Sample the background colour from the four corners and average them.
    // The sprite edges will have remnants of this colour.
    function corner(x, y) {
      const i = (y * W + x) * 4;
      return [px[i], px[i+1], px[i+2], px[i+3]];
    }
    const corners = [corner(0,0), corner(W-1,0), corner(0,H-1), corner(W-1,H-1)]
      .filter(([,,,a]) => a > 0);  // skip already-transparent corners
    const bgR = corners.length ? corners.reduce((s,[r])=>s+r,0)/corners.length : 236;
    const bgG = corners.length ? corners.reduce((s,[,g])=>s+g,0)/corners.length : 236;
    const bgB = corners.length ? corners.reduce((s,[,,b])=>s+b,0)/corners.length : 236;
    const TOL = 60;  // wider than the original ±25 — catches partial anti-alias

    function nearBg(i) {
      return Math.abs(px[i]  -bgR)<TOL &&
             Math.abs(px[i+1]-bgG)<TOL &&
             Math.abs(px[i+2]-bgB)<TOL &&
             px[i+3] > 0;
    }

    // ── Step 1: flood-fill from all four edges (same as process-sprites.js) ──
    const visited = new Uint8Array(W * H);
    const queue   = [];

    function enq(x, y) {
      if (x<0||x>=W||y<0||y>=H) return;
      const pos = y*W+x;
      if (visited[pos]) return;
      if (!nearBg(pos*4)) return;
      visited[pos] = 1;
      queue.push(x, y);
    }
    for (let x=0;x<W;x++) { enq(x,0); enq(x,H-1); }
    for (let y=0;y<H;y++) { enq(0,y); enq(W-1,y); }

    let head = 0;
    while (head < queue.length) {
      const x = queue[head++], y = queue[head++];
      px[(y*W+x)*4+3] = 0;
      enq(x+1,y); enq(x-1,y); enq(x,y+1); enq(x,y-1);
      enq(x+1,y+1); enq(x-1,y-1); enq(x+1,y-1); enq(x-1,y+1);
    }

    // ── Step 2: iterative edge erosion — catches fringe the flood-fill missed ──
    for (let pass = 0; pass < 3; pass++) {
      let changed = false;
      for (let y=0;y<H;y++) {
        for (let x=0;x<W;x++) {
          const i = (y*W+x)*4;
          if (px[i+3]===0) continue;
          if (!nearBg(i)) continue;
          // Only remove if adjacent to a transparent pixel (true edge fringe)
          let edge = false;
          for (let dy=-1; dy<=1&&!edge; dy++)
            for (let dx=-1; dx<=1&&!edge; dx++) {
              if (!dx&&!dy) continue;
              const nx=x+dx, ny=y+dy;
              if (nx<0||nx>=W||ny<0||ny>=H) { edge=true; break; }
              if (px[(ny*W+nx)*4+3]===0) edge=true;
            }
          if (edge) { px[i+3]=0; changed=true; }
        }
      }
      if (!changed) break;
    }

    ctx.putImageData(id, 0, 0);
    c.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      imgEl.onload = () => { URL.revokeObjectURL(url); resolve(); };
      imgEl.src = url;
    }, 'image/png');
  });
}

// Clean both sprites before showing Alfred
Promise.all([
  cleanFringe(document.getElementById('spr-idle')),
  cleanFringe(document.getElementById('spr-walk')),
]).then(() => {
  // Re-apply image-rendering after src replacement
  document.querySelectorAll('.spr').forEach(s => s.style.imageRendering = 'pixelated');
});

// ── State machine ─────────────────────────────────────────────────────────────
// States: 'idle' | 'walk' | 'talk'
// All visual changes are driven by CSS classes — no JS style manipulation.

function setState(state) {
  wrap.classList.remove('walking', 'talking');
  if (state === 'walk') wrap.classList.add('walking');
  if (state === 'talk') wrap.classList.add('talking');
}

function setDir(dir) {
  // dir: -1 = left (default), +1 = right (mirrored)
  wrap.classList.toggle('facing-right', dir > 0);
}

// ── Speech bubble ─────────────────────────────────────────────────────────────
let bubbleTimer = null;

function showBubble(text) {
  bubble.textContent = text;
  bubble.classList.add('visible');
  setState('talk');

  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => {
    bubble.classList.remove('visible');
    // Return to idle; main.js will resume walking via pauseWalking timeout
    setState('idle');
  }, 5000 + text.split('\n').length * 1200);
}

// ── IPC from main process ─────────────────────────────────────────────────────
ipcRenderer.on('set-state', (_, s) => setState(s));
ipcRenderer.on('set-dir',   (_, d) => setDir(d));
ipcRenderer.on('speak',     (_, t) => showBubble(t));

// ── Click → open dashboard ────────────────────────────────────────────────────
wrap.addEventListener('click', () => ipcRenderer.invoke('open-dash'));
</script>
</body>
</html>
